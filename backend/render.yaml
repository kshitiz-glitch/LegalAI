services:
  - type: web
    name: legalai-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_COLLECTION
        value: legal_clauses
      - key: CORS_ORIGINS
        sync: false
      - key: BM25_INDEX_PATH
        value: ./data/bm25_index.pkl
      - key: PYTHON_VERSION
        value: "3.13.0"
